<body class="bg-background text-on-background font-body-md min-h-screen selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<div class="flex h-screen w-full">
<!-- Left Half: Visual Pattern -->
<div class="hidden lg:block w-1/2 h-full bg-surface-container relative border-r-border-width border-on-surface">
<!-- Using an image placeholder with a detailed prompt for a geometric/neubrutalist pattern -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="A striking digital art pattern featuring aggressive, hard-edged geometric shapes and overlapping grids in vivid neon lime, electric cyan, and stark magenta against a textured off-white background. The composition is highly structured, rejecting soft gradients in favor of sharp contrasts and physical drop shadows. The aesthetic is strictly neubrutalist, evoking a sense of raw digital energy and modern structural design typical of high-end tech interfaces. Lighting is flat and uniform to emphasize the graphic elements." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAGPKMZyqQVOTVVjxd9lVpfpDGnAmVb6C53dpD_R8wgMthvG6QfkZ0oPZ79yhF-uTFZosmw57XoSoOCgUgO4Lx-rZpJD79u4Ooi9OFhCrlBR3BvuFA2mqXiNf8QMEXeQMlTWfgNtcTSHKkCQv43DYV_lLlY_IHVmgSA2e_4wVIAQ5QWs3bkSQXYITJ0MG4WiH98PZIBO1BZP3WQ_tLjTHGz7GXaJi_jwOHVfne5WMMcaEYGWTTpZdworpYPiEnSVJ9Unxs2fpR46fg');"></div>
<!-- Optional overlay to ensure contrast if needed, but keeping it raw for neubrutalism -->
<div class="absolute inset-0 bg-surface-container/20 mix-blend-multiply pointer-events-none"></div>
</div>
<!-- Right Half: Login Form -->
<div class="w-full lg:w-1/2 h-full flex items-center justify-center p-margin bg-background relative overflow-y-auto">
<!-- Decorative background elements (optional, to tie in the theme) -->
<div class="absolute top-10 right-10 w-24 h-24 bg-tertiary-container border-border-width border-on-surface shadow-[8px_8px_0px_0px_#1C1B1B] -z-10 animate-pulse" style="animation-duration: 4s;"></div>
<div class="absolute bottom-20 left-10 w-16 h-16 bg-secondary-container border-border-width border-on-surface shadow-[8px_8px_0px_0px_#1C1B1B] -z-10"></div>
<!-- Login Card -->
<div class="w-full max-w-[500px] bg-surface border-border-width border-on-surface shadow-[12px_12px_0px_0px_#1C1B1B] p-10 flex flex-col gap-8 transition-transform duration-300">
<!-- Header -->
<div class="flex flex-col gap-2">
<h1 class="font-display-lg text-display-lg text-on-surface uppercase break-words leading-none">
                        Biblio<div>Tech
                    </div></h1>
<p class="font-body-lg text-body-lg text-on-surface-variant uppercase tracking-widest border-t-border-width border-on-surface pt-2 mt-2">
                        Sistema de Gestión de Biblioteca UNSCH
                    </p>
</div>
<!-- Form -->
<form id="loginForm" class="flex flex-col gap-6 w-full mt-4" method="POST">
<!-- Error message --><div id="error-message" class="hidden text-error mt-2 font-semibold"></div>
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface uppercase" for="email">
                            Correo Institucional
                        </label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface z-10">
                                mail
                            </span>
<input class="w-full h-14 pl-12 pr-4 bg-surface border-border-width border-on-surface text-on-surface font-body-md focus:outline-none focus:ring-0 focus:bg-primary-container focus:border-on-surface transition-colors rounded-none placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="usuario@unsch.edu.pe" required="" type="email">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface uppercase flex justify-between" for="password">
                            Contraseña
                            <a class="text-on-surface-variant hover:text-on-surface hover:underline normal-case" href="#">¿Olvidaste?</a>
</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface z-10">
                                lock
                            </span>
<input class="w-full h-14 pl-12 pr-12 bg-surface border-border-width border-on-surface text-on-surface font-body-md focus:outline-none focus:ring-0 focus:bg-primary-container focus:border-on-surface transition-colors rounded-none placeholder:text-on-surface-variant/50" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface hover:text-on-surface-variant transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="visibility-icon">
                                    visibility
                                </span>
</button>
</div>
</div>
<!-- Actions -->
<div class="pt-4">
<button class="w-full h-16 bg-primary-container text-on-primary-container font-label-bold text-label-bold text-lg uppercase border-border-width border-on-surface shadow-[8px_8px_0px_0px_#1C1B1B] hover:translate-x-1 hover:translate-y-1 hover:shadow-[4px_4px_0px_0px_#1C1B1B] active:translate-x-2 active:translate-y-2 active:shadow-none transition-all duration-150 flex items-center justify-center gap-2" type="submit">
                            Ingresar al Sistema
                            <span class="material-symbols-outlined" data-weight="fill">
                                arrow_forward
                            </span>
</button>
</div>
</form>
<!-- Footer (Optional minimal branding) -->
<div class="mt-8 pt-4 border-t-2 border-on-surface border-dashed text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                        © 2024 Universidad Nacional de San Cristóbal de Huamanga
                    </p>
</div>
</div>
</div>
</div>
<!-- Micro-interaction Scripts -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility';
            }
        }
    </script>


    <script src="js/login.js"></script>
</body></html>
